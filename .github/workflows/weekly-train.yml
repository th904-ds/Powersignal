name: Weekly Model Training

on:
  schedule:
    # KST Monday 03:00 = UTC Sunday 18:00
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  weekly-train:
    runs-on: ubuntu-latest

    env:
      PG_URL: ${{ secrets.PG_URL }}
      DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
      KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
      KPX_API_KEY: ${{ secrets.KPX_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute 03.Modeling/Model_Train_Final.ipynb \
            --output Model_Train_Final.executed.ipynb \
            --ExecutePreprocessor.timeout=7200

      - name: Upload executed training notebook on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-executed-notebook
          path: 02.model/Model_Train_Final.executed.ipynb
          if-no-files-found: ignore
